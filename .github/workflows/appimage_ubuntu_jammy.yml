name: appimage_amd64
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: "sudo apt-get update && sudo apt-get install -y cmake
              qtbase5-dev qttools5-dev qttools5-dev-tools qtdeclarative5-dev
              qtdeclarative5-dev-tools qtquickcontrols2-5-dev libqt5svg5-dev
              qml-module-qt-labs-settings qml-module-qtgraphicaleffects
              qml-module-qtqml-models2 qml-module-qtquick2 qml-module-qtquick-controls2
              qml-module-qtquick-layouts qml-module-qtquick-particles2
              qml-module-qtquick-templates2 qml-module-qtquick-window2
              zlib1g-dev libssl-dev libflac-dev libflac++-dev libpulse-dev
              libdbus-1-dev libqt5dbus5"

      - name: Init submodules
        run: git submodule init && git submodule update

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DQT_STATICPLUGIN=ON -DCMAKE_INSTALL_PREFIX=/usr .

      - name: Build
        run: cd build && make -j`nproc` install DESTDIR=../AppDir

      - name: Download AppImage builder
        run: |
          sudo apt-get install -y binutils coreutils desktop-file-utils fakeroot fuse libgdk-pixbuf2.0-dev patchelf python3-pip python3-setuptools squashfs-tools strace util-linux zsync 
          wget -O appimagetool https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          wget -O linuxdeploy-plugin-qt https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt
          wget -O linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy

      - name: Build AppImage stage 1
        run: |
          cp -r /usr/lib/x86_64-linux-gnu/qt5/qml ./AppDir/usr/
          mv ./AppDir/usr/lib/x86_64-linux-gnu/noson/noson-cli ./AppDir/usr/bin/
      - name: Build AppImage stage 2
        run: ./linuxdeploy --appdir ./AppDir --plugin qt --library /usr/lib/x86_64-linux-gnu/libpulse-simple.so.0
      - name: Package AppImage
        run: ./appimagetool ./AppDir

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AppImage
          path: './noson*.AppImage*'
          retention-days: 5
